    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #111827; /* More consistent dark background */

      /* Modern scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

        background: #1f2937; /* Darker track */
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563; /* Medium gray thumb */

      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280; /* Lighter gray on hover */
      }
      .chart-container {
        width: 100%;
        height: 350px; /* Default height for charts */
      }
    </style>
